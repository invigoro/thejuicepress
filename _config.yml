# Jekyll configuration for GitHub Pages
# Docs: https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site

title: The Juice Press
description: >-
  A GitHub Pages site built with Jekyll and Markdown.

# Canonical URL for feeds and SEO. Custom subdomain (site lives at domain root).
# Project Pages default: https://invigoro.github.io/thejuicepress/ — leave baseurl empty
# when using a subdomain custom domain so asset paths match thejuicepress.invigoro.me/.
url: "https://thejuicepress.invigoro.me"
baseurl: ""

theme: minima

# Plugins supported on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from

# Minima skin: classic, dark, solarized-light, solarized-dark
minima:
  skin: classic

markdown: kramdown

defaults:
  - scope:
      path: "articles"
    values:
      layout: post
      article: true
      permalink: "/articles/:basename/"
  - scope:
      path: "quizzes"
    values:
      layout: quiz
      quiz: true
      header_exclude: true
      permalink: "/quizzes/:basename/"
  # Listing pages must override folder defaults (quiz/article flags + header_exclude on quizzes)
  - scope:
      path: "articles/index.md"
    values:
      layout: page
      article: false
      permalink: "/articles/"
  - scope:
      path: "quizzes/index.md"
    values:
      layout: page
      quiz: false
      header_exclude: false
      permalink: "/quizzes/"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts
  - "*.sql"
